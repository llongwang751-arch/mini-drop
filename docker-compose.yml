services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minidrop
      MINIO_ROOT_PASSWORD: minidrop-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: minidrop
      MYSQL_USER: minidrop
      MYSQL_PASSWORD: minidrop
      MYSQL_ROOT_PASSWORD: minidrop-root
    volumes: [mysql-data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uminidrop", "-pminidrop"]
      interval: 3s
      timeout: 3s
      retries: 30
  server:
    build: .
    environment:
      DATABASE_URL: mysql+pymysql://minidrop:minidrop@mysql:3306/minidrop
      OBJECT_STORAGE: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minidrop
      MINIO_SECRET_KEY: minidrop-secret
      MINIO_BUCKET: minidrop
    ports: ["8080:8080"]
    depends_on:
      mysql: {condition: service_healthy}
      minio: {condition: service_started}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    command: python -m minidrop.agent --server http://server:8080 --id local-agent
    depends_on:
      server: {condition: service_healthy}
    pid: host
    privileged: true
volumes:
  mysql-data:
  minio-data:
